<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Log</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">🌙</button>
    
    <div class="container">
        <header class="profile-header">
            <div class="profile-pic">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmYzYzc4IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PGNpcmNsZSBjeD0iMTIiIGN5PSI4IiByPSI0Ii8+PHBhdGggZD0iTTYgMjF2LTIuMGE2LjAgNi4wIDAgMCAxIDEyIDBWMjEiLz48L3N2Zz4=" alt="Profile Picture" id="profile-img" style="background-color: var(--card-bg); padding: 20px; box-sizing: border-box;">
            </div>
            <div class="profile-info">
                <h1>My Photo Log</h1>
                <p>Capturing moments, one pixel at a time.</p>
                <label for="photo-upload" class="upload-btn">
                    <span>+ Add Photo</span>
                    <input type="file" id="photo-upload" accept="image/*" hidden>
                </label>
            </div>
        </header>

        <main class="gallery" id="gallery">
            <!-- Photos will be injected here -->
            <div class="gallery-item placeholder">
                <p>No photos yet. Add some!</p>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
